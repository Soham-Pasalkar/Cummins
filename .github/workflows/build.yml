name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller ^
          --onefile ^
          --windowed ^                         # no console window
          --name "PumaApp" ^
          --add-data "app.py;." ^
          --add-data "cummins-logo-png-transparent.png;." ^
          launcher.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: puma-exe
        path: dist/PumaApp.exe
